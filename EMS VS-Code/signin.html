<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Paoyaila</title>
  <style>
    :root {
      --bg: #08101f;
      --surface: #0f1b36;
      --surface-soft: rgba(255,255,255,0.08);
      --text: #edf2ff;
      --muted: #a2b4d1;
      --accent: #2bb7ff;
      --accent-strong: #48deff;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #07101e 0%, #091827 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(43,183,255,0.22), transparent 22%),
                  radial-gradient(circle at right, rgba(255,255,255,0.1), transparent 15%);
      pointer-events: none;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(9,24,43,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(43,183,255,0.14), transparent 18%);
      opacity: 0.88;
      pointer-events: none;
    }
    .card > * { position: relative; z-index: 1; }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .brand img { width: 100px; height: auto; }
    .brand h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -0.04em;
    }
    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.75;
    }
    form { display: grid; gap: 18px; }
    label {
      display: grid;
      gap: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }
    select, input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      outline: none;
      transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }
    select:hover, input:hover { transform: translateY(-1px); }
    select:focus, input:focus {
      border-color: rgba(43,183,255,0.65);
      box-shadow: 0 0 0 4px rgba(43,183,255,0.12);
    }
    button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(135deg, #2bb7ff, #48deff);
      color: #08101f;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(43,183,255,0.3); }
    .note {
      margin-top: 4px;
      color: #8fb7ff;
      font-size: 0.9rem;
    }
    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer a { color: #a4caff; }
    @media (max-width: 560px) {
      .card { padding: 28px; }
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="brand">
      <img src="paoyaila-logo.svg" alt="Paoyaila logo" />
      <div>
        <h1>Sign In</h1>
        <p class="subtitle">Access the Paoyaila studio portal for admin, HR, manager, employee, or intern.</p>
      </div>
    </div>

    <form action="#" method="post">
      <label>
        Select Role
        <select name="role" required>
          <option value="" disabled selected>Choose a role</option>
          <option value="admin">Admin</option>
          <option value="hr">HR</option>
          <option value="manager">Manager</option>
          <option value="employee">Employee</option>
          <option value="intern">Intern</option>
        </select>
      </label>
      <label>
        User ID
        <input type="text" name="userId" placeholder="Enter your ID" required />
      </label>
      <label>
        Name
        <input type="text" name="name" placeholder="Enter your name" required />
      </label>
      <label>
        Password
        <input type="password" name="password" placeholder="Enter your password" required />
      </label>
      <button type="submit">Sign In</button>
    </form>

    <div class="footer">
      <span class="note">Use the role selector to choose Admin, HR, Manager, Employee, or Intern.</span>
      <a href="introduction.html">Back to Intro</a>
    </div>
  </article>
</body>
</html>
